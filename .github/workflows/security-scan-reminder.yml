name: Security Scan Reminder

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  post-scan-trigger:
    runs-on: ubuntu-24.04
    steps:
      - name: Post or update PR trigger comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const marker = '<!-- security-scan-bot -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const branch = context.payload.pull_request.head.ref;
            const headSha = context.payload.pull_request.head.sha;
            const shortSha = headSha.slice(0, 7);
            const workflowUrl =
              `https://github.com/${owner}/${repo}/actions/workflows/security-scan.yml` +
              `?query=branch:${encodeURIComponent(branch)}`;

            const body = [
              marker,
              '## Security scan required before merge',
              '',
              `This PR must pass a security scan on the **latest commit** (\`${shortSha}\`) before it can be merged.`,
              '',
              '### Run scan',
              '',
              `[![Run Security Scan](https://img.shields.io/badge/Run-Security%20Scan-0366d6?style=for-the-badge&logo=githubactions&logoColor=white)](${workflowUrl})`,
              '',
              '1. Click **Run Security Scan** above',
              '2. Press **Run workflow**',
              `3. Select branch \`${branch}\`, then **Run workflow**`,
              '',
              'Or comment `/run-security-scan` on this PR to start the scan automatically.',
              '',
              '> **Note:** Each new push invalidates the previous scan. Re-run after your latest commit before merging.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated security scan comment on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
              console.log(`Created security scan comment on PR #${prNumber}`);
            }
